apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: todo-api 
  namespace: todo-api 
  labels: 
    app: todo-api 
spec: 
  replicas: 3
  selector: 
    matchLabels: 
      app: todo-api 
  template: 
    metadata: 
      labels: 
        app: todo-api 
    spec: 
      containers: 
        - name: todo-api 
          image: nginx:latest
          # Ex: image: docker.io/monuser/todo-api:v1.0.0 
          ports: 
            - containerPort: 80
              name: http 
          env: 
            - name: PORT 
              value: "80" 
            - name: NODE_ENV 
              value: "production" 
          resources: 
            requests: 
              cpu: "100m" 
              memory: "128Mi" 
            limits: 
              cpu: "500m" 
              memory: "256Mi" 
          livenessProbe: 
            httpGet: 
              path: /health 
              port: http 
            initialDelaySeconds: 10 
            periodSeconds: 10 
          readinessProbe: 
            httpGet: 
              path: /health 
              port: http 
            initialDelaySeconds: 5 
            periodSeconds: 5