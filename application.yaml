# application.yaml 
apiVersion: argoproj.io/v1alpha1 
kind: Application 
metadata: 
  name: todo-api 
  namespace: argocd 
spec: 
  project: default 
  source: 
    repoURL: https://github.com/M0hameed0/gitops-team-sup.git
    targetRevision: HEAD 
    path: apps/todo-api 
  destination: 
    server: https://kubernetes.default.svc 
    namespace: todo-api 
  syncPolicy: 
    automated: 
      prune: true 
      selfHeal: true 
    syncOptions: 
      - CreateNamespace=true 