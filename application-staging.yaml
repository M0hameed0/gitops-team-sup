apiVersion: argoproj.io/v1alpha1 
kind: Application 
metadata: 
  name: todo-api-staging 
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: 'https://github.com/groupesup4/gitops-team-sup.git'
    targetRevision: gitops-mohamed    # <-- C'est ici que la magie opère !
    path: apps/todo-api/overlays/dev
  destination:
    server: https://kubernetes.default.svc 
    namespace: todo-api-staging 
  syncPolicy: 
    automated: 
      prune: true 
      selfHeal: true 
    syncOptions: 
      - CreateNamespace=true 
