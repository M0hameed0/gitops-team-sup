apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-api-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/groupesup4/gitops-team-sup
    targetRevision: gitops-abdel
    path: apps/todo-api/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: todo-api-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
